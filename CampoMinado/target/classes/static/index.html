<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campo Minado</title>
  <style>
    :root {
      --navy: #102a43;
      --blue: #1f6feb;
      --surface: #f5f8fc;
      --cell: #dce6f2;
      --cell-hover: #c8d8ec;
      --border: #9fb3c8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--navy);
      background: radial-gradient(circle at top, #d9ebff, #eff5fb 55%, #dfe9f4);
    }

    .game {
      width: min(100%, 620px);
      padding: clamp(20px, 5vw, 38px);
      border: 1px solid rgba(159, 179, 200, .65);
      border-radius: 24px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 20px 50px rgba(16, 42, 67, .15);
    }

    header { text-align: center; margin-bottom: 24px; }
    h1 { margin: 0; font-size: clamp(2rem, 7vw, 3.2rem); letter-spacing: -.06em; }
    header p { margin: 8px 0 0; color: #627d98; }

    .panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      margin-bottom: 18px;
      border-radius: 14px;
      background: var(--navy);
      color: white;
    }
    .status { display: grid; gap: 2px; min-width: 76px; }
    .status span { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: #bcccdc; }
    .status strong { font-size: 1.2rem; }
    .restart {
      width: 48px; height: 48px; border: 0; border-radius: 12px;
      font-size: 1.55rem; cursor: pointer; transition: transform .15s, background .15s;
      background: #f0b429;
    }
    .restart:hover { transform: translateY(-2px) rotate(12deg); background: #f7c948; }

    .board {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      aspect-ratio: 1;
      gap: 4px;
      padding: 5px;
      border-radius: 12px;
      background: var(--border);
      user-select: none;
    }
    .cell {
      display: grid; place-items: center;
      min-width: 0; border: 0; border-radius: 6px;
      font-size: clamp(.8rem, 3.8vw, 1.25rem); font-weight: 800;
      cursor: pointer; color: var(--navy); background: var(--cell);
      box-shadow: inset 0 2px 0 rgba(255,255,255,.75), inset 0 -2px 0 rgba(16,42,67,.14);
      transition: background .12s, transform .12s;
    }
    .cell:hover:not(.open) { background: var(--cell-hover); transform: translateY(-1px); }
    .cell.open { cursor: default; background: #f8fbff; box-shadow: none; }
    .cell.flagged { background: #ffe8a3; }
    .cell.mine { background: #ffb3b3; }
    .n1 { color: #1f6feb; } .n2 { color: #14804a; } .n3 { color: #d64545; }
    .n4 { color: #7048e8; } .n5 { color: #a61e4d; } .n6 { color: #0b7285; }

    .message { min-height: 24px; margin: 17px 0 0; text-align: center; color: #486581; font-weight: 600; }
    .message.won { color: #14804a; } .message.lost { color: #c92a2a; }
    .help { margin: 10px 0 0; text-align: center; font-size: .82rem; color: #829ab1; }
  </style>
</head>
<body>
  <main class="game">
    <header>
      <h1>Campo Minado</h1>
      <p>Encontre as casas seguras. Evite as minas.</p>
    </header>

    <section class="panel" aria-label="Informações da partida">
      <div class="status"><span>Minas</span><strong id="mines">10</strong></div>
      <button class="restart" id="restart" type="button" title="Nova partida" aria-label="Iniciar nova partida">🙂</button>
      <div class="status" style="text-align:right"><span>Tempo</span><strong id="time">000</strong></div>
    </section>

    <section class="board" id="board" aria-label="Tabuleiro do Campo Minado"></section>
    <p class="message" id="message">Clique para abrir uma casa.</p>
    <p class="help">Clique com o botão direito para marcar uma bandeira.</p>
  </main>

  <script>
    const SIZE = 9, TOTAL_MINES = 10;
    const board = document.getElementById('board');
    const minesLabel = document.getElementById('mines');
    const timeLabel = document.getElementById('time');
    const message = document.getElementById('message');
    const restart = document.getElementById('restart');
    let cells, flags, started, finished, seconds, timer;

    const neighbors = index => {
      const row = Math.floor(index / SIZE), col = index % SIZE, result = [];
      for (let r = row - 1; r <= row + 1; r++) for (let c = col - 1; c <= col + 1; c++)
        if (r >= 0 && r < SIZE && c >= 0 && c < SIZE && (r !== row || c !== col)) result.push(r * SIZE + c);
      return result;
    };

    function startTimer() {
      if (started) return;
      started = true;
      timer = setInterval(() => { seconds++; timeLabel.textContent = String(seconds).padStart(3, '0'); }, 1000);
    }

    function createBoard() {
      clearInterval(timer); flags = 0; started = false; finished = false; seconds = 0;
      timeLabel.textContent = '000'; minesLabel.textContent = TOTAL_MINES; message.textContent = 'Clique para abrir uma casa.';
      message.className = 'message'; restart.textContent = '🙂'; board.innerHTML = '';
      cells = Array.from({ length: SIZE * SIZE }, () => ({ mine: false, open: false, flagged: false, count: 0 }));
      [...Array(SIZE * SIZE).keys()].sort(() => Math.random() - .5).slice(0, TOTAL_MINES).forEach(i => cells[i].mine = true);
      cells.forEach((cell, index) => cell.count = neighbors(index).filter(i => cells[i].mine).length);
      cells.forEach((_, index) => {
        const button = document.createElement('button'); button.className = 'cell'; button.type = 'button'; button.setAttribute('aria-label', `Casa ${index + 1}`);
        button.addEventListener('click', () => openCell(index));
        button.addEventListener('contextmenu', event => { event.preventDefault(); flagCell(index); });
        board.append(button);
      });
    }

    function render(index) {
      const cell = cells[index], element = board.children[index];
      element.className = 'cell'; element.textContent = '';
      if (cell.open) { element.classList.add('open'); if (cell.mine) { element.classList.add('mine'); element.textContent = '💣'; } else if (cell.count) { element.classList.add(`n${cell.count}`); element.textContent = cell.count; } }
      else if (cell.flagged) { element.classList.add('flagged'); element.textContent = '🚩'; }
    }

    function openCell(index) {
      const cell = cells[index]; if (finished || cell.open || cell.flagged) return;
      startTimer(); cell.open = true; render(index);
      if (cell.mine) return endGame(false);
      if (!cell.count) neighbors(index).forEach(openCell);
      if (cells.filter(cell => !cell.mine && cell.open).length === SIZE * SIZE - TOTAL_MINES) endGame(true);
    }

    function flagCell(index) {
      const cell = cells[index]; if (finished || cell.open) return;
      cell.flagged = !cell.flagged; flags += cell.flagged ? 1 : -1;
      minesLabel.textContent = TOTAL_MINES - flags; render(index);
    }

    function endGame(won) {
      finished = true; clearInterval(timer); restart.textContent = won ? '😎' : '😵';
      if (!won) cells.forEach((cell, index) => { if (cell.mine) { cell.open = true; render(index); } });
      message.textContent = won ? 'Você venceu! Excelente trabalho.' : 'Uma mina explodiu. Tente novamente!';
      message.classList.add(won ? 'won' : 'lost');
    }

    restart.addEventListener('click', createBoard);
    createBoard();
  </script>
</body>
</html>
